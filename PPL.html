<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PPL Rugby">
<meta name="theme-color" content="#0a0a0a">
<title>PPL Rugby</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e; --surface3: #282828;
  --accent: #e8ff3d; --text: #f0f0f0; --text-muted: #666; --text-dim: #999;
  --danger: #ff4444; --success: #3dff8f; --border: rgba(255,255,255,0.07);
  --radius: 12px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; overflow: hidden; }
body { display: flex; flex-direction: column; }
.screen { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
.screen.active { display: flex; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 52px 20px 16px; background: var(--bg); flex-shrink: 0; }
.topbar-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: 0.02em; text-transform: uppercase; }
.topbar-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.btn-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--surface2); border: none; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.scroll { flex: 1; overflow-y: auto; padding: 0 16px 100px; -webkit-overflow-scrolling: touch; }
.week-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin: 8px 0 12px; }
.day-card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; transition: transform 0.1s; position: relative; overflow: hidden; display: flex; align-items: center; gap: 14px; }
.day-card:active { transform: scale(0.98); }
.day-card.done::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--success); }
.day-num { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; color: var(--accent); line-height: 1; min-width: 36px; }
.day-info { flex: 1; }
.day-name { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
.day-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.day-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
.tag-push { background: rgba(255,100,50,0.15); color: #ff7a50; }
.tag-pull { background: rgba(50,150,255,0.15); color: #5ab4ff; }
.tag-arms { background: rgba(160,80,255,0.15); color: #c070ff; }
.tag-legs { background: rgba(61,255,143,0.12); color: #3dff8f; }
.stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 0 16px 16px; }
.stat-box { background: var(--surface); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--border); text-align: center; }
.stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; color: var(--accent); }
.stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.session-header { padding: 52px 20px 0; background: var(--bg); flex-shrink: 0; }
.session-day-tag { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.session-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; }
.progress-bar { height: 2px; background: var(--surface3); margin: 10px 0 0; border-radius: 2px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.exo-card { background: var(--surface); border-radius: var(--radius); margin-bottom: 10px; border: 1px solid var(--border); overflow: hidden; }
.exo-header { padding: 14px 16px 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.exo-name { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; flex: 1; }
.exo-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 7px; border-radius: 4px; white-space: nowrap; margin-top: 2px; display: inline-block; }
.badge-warmup { background: rgba(255,170,50,0.15); color: #ffaa32; }
.badge-key { background: rgba(61,255,143,0.12); color: #3dff8f; }
.sets-header { display: grid; grid-template-columns: 28px 1fr 1fr 36px 28px; gap: 6px; padding: 0 12px 4px; }
.set-label { font-size: 10px; color: var(--text-muted); text-align: center; letter-spacing: 0.05em; text-transform: uppercase; }
.sets-container { padding: 0 12px 8px; display: flex; flex-direction: column; gap: 6px; }
.set-row { display: grid; grid-template-columns: 28px 1fr 1fr 36px 28px; gap: 6px; align-items: center; }
.set-num { font-size: 11px; color: var(--text-muted); text-align: center; font-weight: 600; }
.set-input { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 6px; font-size: 14px; font-weight: 600; color: var(--text); text-align: center; font-family: 'Barlow Condensed', sans-serif; width: 100%; -webkit-appearance: none; }
.set-input:focus { outline: none; border-color: var(--accent); }
.set-input.done-input { border-color: rgba(61,255,143,0.4); background: rgba(61,255,143,0.05); }
.set-check { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; }
.set-check.checked { background: var(--success); border-color: var(--success); color: #000; }
.rest-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-top: 1px solid var(--border); }
.rest-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.rest-controls { display: flex; align-items: center; gap: 8px; }
.rest-btn { width: 28px; height: 28px; border-radius: 50%; background: var(--surface3); border: none; color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.rest-val { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); min-width: 40px; text-align: center; }
.add-set-btn { width: 100%; padding: 8px; background: transparent; border: 1px dashed var(--border); border-radius: var(--radius-sm); color: var(--text-muted); font-size: 12px; cursor: pointer; font-family: 'Barlow', sans-serif; }
.add-exo-btn { width: 100%; padding: 14px; background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); color: var(--text-dim); font-size: 13px; cursor: pointer; margin-bottom: 10px; font-family: 'Barlow', sans-serif; display: flex; align-items: center; justify-content: center; gap: 6px; }
.bottom-cta { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); background: linear-gradient(to top, var(--bg) 70%, transparent); }
.btn-primary { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: var(--radius); font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: opacity 0.15s; }
.btn-primary:active { opacity: 0.85; }
.timer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
.timer-overlay.active { display: flex; }
.timer-circle { width: 180px; height: 180px; border-radius: 50%; border: 3px solid var(--accent); display: flex; align-items: center; justify-content: center; }
.timer-num { font-family: 'Barlow Condensed', sans-serif; font-size: 64px; font-weight: 800; color: var(--accent); }
.timer-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
.timer-skip { padding: 12px 32px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: flex-end; }
.modal-overlay.active { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 20px; width: 100%; max-height: 88vh; overflow-y: auto; }
.modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; text-transform: uppercase; margin-bottom: 16px; }
.modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 15px; color: var(--text); font-family: 'Barlow', sans-serif; margin-bottom: 10px; }
.modal-input:focus { outline: none; border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn-secondary { flex: 1; padding: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
.hist-entry { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s; }
.hist-entry:active { border-color: var(--accent); }
.hist-date { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.hist-name { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; margin-top: 2px; }
.hist-chips { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
.hist-chip { font-size: 12px; color: var(--text-dim); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-big { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 800; color: var(--surface3); }
.navbar { display: flex; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; padding: 12px 8px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-family: 'Barlow', sans-serif; text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.15s; }
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 20px; }
.sect-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="topbar">
    <div>
      <div class="topbar-title">PPL Rugby 🏉</div>
      <div class="topbar-sub" id="home-date"></div>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-box"><div class="stat-val" id="stat-week">0</div><div class="stat-label">Semaine</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-streak">0</div><div class="stat-label">Série</div></div>
  </div>
  <div class="scroll" id="home-days"></div>
  <div class="navbar">
    <button class="nav-btn active" id="nav-home" onclick="showTab('home')"><span class="nav-icon">🏠</span>Accueil</button>
    <button class="nav-btn" id="nav-history" onclick="showTab('history')"><span class="nav-icon">📅</span>Historique</button>
    <button class="nav-btn" id="nav-stats" onclick="showTab('stats')"><span class="nav-icon">📈</span>Stats</button>
  </div>
</div>

<!-- SESSION -->
<div class="screen" id="screen-session">
  <div class="session-header">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <button class="btn-icon" onclick="goHome()">←</button>
      <button class="btn-icon" style="color:var(--danger)" onclick="cancelSession()">✕</button>
    </div>
    <div style="margin-top:12px">
      <div class="session-day-tag" id="sess-tag"></div>
      <div class="session-title" id="sess-title"></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="sess-progress" style="width:0%"></div></div>
  </div>
  <div class="scroll" id="sess-body" style="padding-top:12px"></div>
  <div class="bottom-cta">
    <button class="btn-primary" onclick="finishSession()">Terminer la séance ✓</button>
  </div>
</div>

<!-- HISTORY -->
<div class="screen" id="screen-history">
  <div class="topbar"><div><div class="topbar-title">Historique</div></div></div>
  <div class="scroll" id="hist-list"></div>
  <div class="navbar">
    <button class="nav-btn" id="nav-home2" onclick="showTab('home')"><span class="nav-icon">🏠</span>Accueil</button>
    <button class="nav-btn active" id="nav-history2" onclick="showTab('history')"><span class="nav-icon">📅</span>Historique</button>
    <button class="nav-btn" id="nav-stats2" onclick="showTab('stats')"><span class="nav-icon">📈</span>Stats</button>
  </div>
</div>

<!-- STATS -->
<div class="screen" id="screen-stats">
  <div class="topbar"><div><div class="topbar-title">Progression 📈</div></div></div>
  <div class="scroll" id="stats-body" style="padding-top:8px"></div>
  <div class="navbar">
    <button class="nav-btn" id="nav-home3" onclick="showTab('home')"><span class="nav-icon">🏠</span>Accueil</button>
    <button class="nav-btn" id="nav-history3" onclick="showTab('history')"><span class="nav-icon">📅</span>Historique</button>
    <button class="nav-btn active" id="nav-stats3" onclick="showTab('stats')"><span class="nav-icon">📈</span>Stats</button>
  </div>
</div>

<!-- TIMER -->
<div class="timer-overlay" id="timer-overlay">
  <div class="timer-label">Repos</div>
  <div class="timer-circle"><div class="timer-num" id="timer-num">90</div></div>
  <button class="timer-skip" onclick="skipTimer()">Passer →</button>
</div>

<!-- MODAL: AJOUTER EXERCICE -->
<div class="modal-overlay" id="modal-add-exo">
  <div class="modal">
    <div class="modal-title">Ajouter un exercice</div>
    <input class="modal-input" id="new-name" placeholder="Nom de l'exercice" />
    <input class="modal-input" id="new-sets" placeholder="Nombre de séries (ex: 3)" type="number" />
    <input class="modal-input" id="new-reps" placeholder="Reps par série (ex: 12)" />
    <input class="modal-input" id="new-weight" placeholder="Charge (ex: 50)" type="number" />
    <input class="modal-input" id="new-rest" placeholder="Repos en secondes (ex: 90)" type="number" />
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeAddExo()">Annuler</button>
      <button class="btn-primary" style="flex:1" onclick="confirmAddExo()">Ajouter</button>
    </div>
  </div>
</div>

<!-- MODAL: DETAIL HISTORIQUE -->
<div class="modal-overlay" id="modal-hist">
  <div class="modal">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
      <div>
        <div class="modal-title" id="hd-title" style="margin-bottom:2px"></div>
        <div id="hd-date" style="font-size:12px;color:var(--text-muted)"></div>
      </div>
      <button class="btn-icon" onclick="closeHistDetail()">✕</button>
    </div>
    <div id="hd-stats" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px"></div>
    <div class="sect-title">Exercices</div>
    <div id="hd-exos"></div>
    <div class="sect-title" style="margin-top:16px">Note pour la prochaine séance</div>
    <textarea id="hd-comment" class="modal-input" rows="3" placeholder="Ex: augmenter les charges sur le rowing..." style="resize:none;font-size:13px;line-height:1.5"></textarea>
    <div class="modal-actions" style="margin-top:0">
      <button class="btn-secondary" style="flex:1" onclick="saveComment()">Sauvegarder la note</button>
      <button class="btn-primary" style="flex:1;background:var(--danger);color:#fff" onclick="showDeleteConfirm()">🗑 Supprimer</button>
    </div>
    <div id="delete-confirm" style="display:none;margin-top:10px;background:rgba(255,68,68,0.1);border:1px solid var(--danger);border-radius:var(--radius-sm);padding:12px;text-align:center">
      <div style="font-size:13px;margin-bottom:10px">Confirmer la suppression ?</div>
      <div style="display:flex;gap:8px">
        <button class="btn-secondary" style="flex:1" onclick="hideDeleteConfirm()">Annuler</button>
        <button class="btn-primary" style="flex:1;background:var(--danger);color:#fff" onclick="deleteHistEntry()">Supprimer</button>
      </div>
    </div>
  </div>
</div>

<script>
const DEFAULT_PROGRAM = [
  { id:'pecs', day:'Lundi', name:'Pecs / Triceps', tag:'push', tagLabel:'Push',
    exercises:[
      { id:'e1', name:'Écarté poulie haute', badge:'warmup', badgeLabel:'Échauffement', note:'Léger — allume la connexion pecs', rest:60, sets:[{reps:'15',weight:'15'},{reps:'15',weight:'20'}] },
      { id:'e2', name:'Développé couché haltères', badge:'key', badgeLabel:'Exercice clé', note:'Légèrement incliné, descente lente 3-4 sec', rest:120, sets:[{reps:'10',weight:'40'},{reps:'10',weight:'45'},{reps:'10',weight:'45'},{reps:'8',weight:'50'}] },
      { id:'e3', name:'Développé incliné haltères', note:'Phase négative contrôlée', rest:120, sets:[{reps:'10',weight:'25'},{reps:'10',weight:'30'},{reps:'10',weight:'30'},{reps:'8',weight:'35'}] },
      { id:'e4', name:'Écarté poulie haute', note:'Finisher pecs — serre bien en haut', rest:90, sets:[{reps:'12',weight:'25'},{reps:'12',weight:'30'},{reps:'12',weight:'30'}] },
      { id:'e5', name:'Extension triceps poulie haute', rest:90, sets:[{reps:'15',weight:'37'},{reps:'15',weight:'50'},{reps:'15',weight:'67'}] },

  },
  { id:'dos', day:'Mardi', name:'Dos / Biceps', tag:'pull', tagLabel:'Pull',

      { id:'e2', name:'Curl marteau haltères', rest:90, sets:[{reps:'12',weight:'20'},{reps:'12',weight:'20'},{reps:'12',weight:'25'}] },
      { id:'e3', name:'Curl barre EZ', note:'Supination complète en haut', rest:90, sets:[{reps:'10',weight:''},{reps:'10',weight:''},{reps:'10',weight:''}] },
      { id:'e4', name:'Extension triceps poulie haute', rest:90, sets:[{reps:'15',weight:'37'},{reps:'15',weight:'50'},{reps:'15',weight:'67'}] },
      { id:'e5', name:'Extension triceps overhead', rest:90, sets:[{reps:'12',weight:'37'},{reps:'12',weight:'50'},{reps:'12',weight:'67'}] },
      { id:'e6', name:'Dips', note:'Finisher — jusqu\'à l\'échec', rest:90, sets:[{reps:'max',weight:'0'},{reps:'max',weight:'0'}] }
    ]
  },
  { id:'jambes', day:'Vendredi', name:'Jambes / Explosivité', tag:'legs', tagLabel:'Legs',
    exercises:[
      { id:'e1', name:'Squat barre', badge:'key', badgeLabel:'Exercice clé', note:'Descente lente, poussée EXPLOSIVE — clé pour le rugby', rest:180, sets:[{reps:'5',weight:'95'},{reps:'5',weight:'120'},{reps:'5',weight:'155'},{reps:'5',weight:'175'},{reps:'5',weight:'185'}] },
      { id:'e2', name:'Presse à cuisses', note:'Poussée explosive — modéré en charge', rest:120, sets:[{reps:'8',weight:''},{reps:'8',weight:''},{reps:'8',weight:''},{reps:'8',weight:''}] },
      { id:'e3', name:'Fentes sautées', note:'Poids du corps — max d\'explosivité', rest:90, sets:[{reps:'10',weight:'0'},{reps:'10',weight:'0'},{reps:'10',weight:'0'},{reps:'10',weight:'0'}] },
      { id:'e4', name:'Leg curl machine', note:'Ischio — prévention blessures rugby', rest:90, sets:[{reps:'12',weight:''},{reps:'12',weight:''},{reps:'12',weight:''}] },
      { id:'e5', name:'Mollets debout', note:'Puissance de foulée', rest:60, sets:[{reps:'15',weight:''},{reps:'15',weight:''},{reps:'15',weight:''},{reps:'15',weight:''}] }
    ]
  }
];

let program = JSON.parse(localStorage.getItem('ppl_program') || 'null') || JSON.parse(JSON.stringify(DEFAULT_PROGRAM));
let history = JSON.parse(localStorage.getItem('ppl_history') || '[]');
let currentSession = null;
let timerInterval = null;
let timerSec = 0;
let currentHistIdx = -1;

function save() {
  localStorage.setItem('ppl_program', JSON.stringify(program));
  localStorage.setItem('ppl_history', JSON.stringify(history));
}

// ─── NAVIGATION ───────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  ['home','history','stats'].forEach(t => {
    ['','2','3'].forEach(suffix => {
      const el = document.getElementById('nav-' + t + suffix);
      if (el) el.classList.toggle('active', t === tab);
    });
  });
  if (tab === 'home') { document.getElementById('screen-home').classList.add('active'); renderHome(); }
  if (tab === 'history') { document.getElementById('screen-history').classList.add('active'); renderHistory(); }
  if (tab === 'stats') { document.getElementById('screen-stats').classList.add('active'); renderStats(); }
}

function goHome() { skipTimer(); showTab('home'); }
function cancelSession() { if (confirm('Annuler cette séance ?')) goHome(); }

// ─── HOME ──────────────────────────────────────────────────────
function renderHome() {
  const now = new Date();
  document.getElementById('home-date').textContent = now.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
  document.getElementById('stat-week').textContent = getWeekCount();
  document.getElementById('stat-total').textContent = history.length;
  document.getElementById('stat-streak').textContent = getStreak();
  const c = document.getElementById('home-days');
  c.innerHTML = '<div class="week-label">Ton programme</div>';
  program.forEach((day, i) => {
    const last = getLastDone(day.id);
    const div = document.createElement('div');
    div.className = 'day-card' + (last ? ' done' : '');
    div.innerHTML = `
      <div class="day-num">${i+1}</div>
      <div class="day-info">
        <div class="day-name">${day.name}</div>
        <div class="day-meta">${day.day} · ${day.exercises.length} exercices${last ? ' · ✓ ' + last : ''}</div>
      </div>
      <span class="day-tag tag-${day.tag}">${day.tagLabel}</span>
      <span style="color:var(--text-muted);font-size:18px">›</span>`;
    div.onclick = () => openSession(i);
    c.appendChild(div);
  });
}

function getLastDone(id) {
  const entries = history.filter(h => h.id === id).sort((a,b) => b.ts - a.ts);
  if (!entries.length) return null;
  return new Date(entries[0].ts).toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
}
function getWeekCount() {
  const start = new Date(); start.setDate(start.getDate() - start.getDay()); start.setHours(0,0,0,0);
  return history.filter(h => h.ts >= start.getTime()).length;
}
function getStreak() {
  if (!history.length) return 0;
  const sorted = [...history].sort((a,b) => b.ts - a.ts);
  let streak = 0, lastDate = null;
  for (const h of sorted) {
    const ds = new Date(h.ts).toDateString();
    if (!lastDate) { lastDate = ds; streak = 1; continue; }
    const prev = new Date(lastDate); prev.setDate(prev.getDate() - 1);
    if (ds === prev.toDateString()) { lastDate = ds; streak++; }
    else if (ds !== lastDate) break;
  }
  return streak;
}

// ─── SESSION ───────────────────────────────────────────────────
function openSession(idx) {
  currentSession = { dayIdx: idx, data: JSON.parse(JSON.stringify(program[idx])), startTime: Date.now() };
  document.getElementById('sess-tag').textContent = currentSession.data.day + ' · ' + currentSession.data.tagLabel;
  document.getElementById('sess-title').textContent = currentSession.data.name;
  renderSession();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-session').classList.add('active');
}

function renderSession() {
  const c = document.getElementById('sess-body');
  c.innerHTML = '';
  currentSession.data.exercises.forEach((exo, ei) => {
    const card = document.createElement('div');
    card.className = 'exo-card';
    const badge = exo.badge ? `<div><span class="exo-badge badge-${exo.badge}">${exo.badgeLabel}</span></div>` : '';
    card.innerHTML = `
      <div class="exo-header">
        <div style="flex:1"><div class="exo-name">${exo.name}</div>${badge}</div>
        <button class="rest-btn" style="color:var(--danger);font-size:15px" onclick="toggleDeleteExo(${ei})">🗑</button>
      </div>
      <div id="del-confirm-${ei}" style="display:none;background:rgba(255,68,68,0.1);border-bottom:1px solid var(--danger);padding:10px 14px;display:none;align-items:center;justify-content:space-between;gap:8px"><span style="font-size:12px">Supprimer cet exercice ?</span><div style="display:flex;gap:6px"><button class="rest-btn" style="width:auto;padding:0 10px;font-size:12px;font-family:Barlow,sans-serif" onclick="toggleDeleteExo(${ei})">Non</button><button class="rest-btn" style="width:auto;padding:0 10px;font-size:12px;font-family:Barlow,sans-serif;background:var(--danger);color:#fff" onclick="deleteExo(${ei})">Oui</button></div></div>
      <div style="padding:0 12px 10px">
        <textarea class="set-input" rows="2" placeholder="Notes / conseils..." style="width:100%;resize:none;font-size:12px;font-family:'Barlow',sans-serif;line-height:1.4;padding:8px 10px;text-align:left" onchange="updateNote(${ei},this.value)">${exo.note || ''}</textarea>
      </div>
      <div class="sets-header">
        <div></div>
        <div class="set-label">Reps</div>
        <div class="set-label">Charge lbs</div>
        <div class="set-label">✓</div>
        <div></div>
      </div>
      <div class="sets-container" id="sets-${ei}"></div>
      <div style="padding:0 12px 8px"><button class="add-set-btn" onclick="addSet(${ei})">+ Ajouter une série</button></div>
      <div class="rest-row">
        <span class="rest-label">⏱ Repos</span>
        <div class="rest-controls">
          <button class="rest-btn" onclick="changeRest(${ei},-15)">−</button>
          <span class="rest-val" id="rest-${ei}">${exo.rest}s</span>
          <button class="rest-btn" onclick="changeRest(${ei},15)">+</button>
        </div>
      </div>`;
    c.appendChild(card);
    renderSets(ei);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-exo-btn';
  addBtn.textContent = '+ Ajouter un exercice';
  addBtn.onclick = () => { document.getElementById('modal-add-exo').classList.add('active'); };
  c.appendChild(addBtn);
  updateProgress();
}

function renderSets(ei) {
  const exo = currentSession.data.exercises[ei];
  const c = document.getElementById('sets-' + ei);
  c.innerHTML = '';
  exo.sets.forEach((set, si) => {
    const row = document.createElement('div');
    row.className = 'set-row';
    row.innerHTML = `
      <div class="set-num">${si+1}</div>
      <input class="set-input${set.done?' done-input':''}" type="number" value="${set.reps==='max'?'':set.reps}" placeholder="${set.reps==='max'?'max':''}" onchange="updateSet(${ei},${si},'reps',this.value)"/>
      <input class="set-input${set.done?' done-input':''}" type="number" value="${set.weight}" placeholder="lbs" onchange="updateSet(${ei},${si},'weight',this.value)"/>
      <button class="set-check${set.done?' checked':''}" onclick="toggleSet(${ei},${si})">✓</button>
      <button class="rest-btn" style="color:var(--danger);font-size:13px" onclick="removeSet(${ei},${si})">✕</button>`;
    c.appendChild(row);
  });
}

function updateSet(ei, si, field, val) { currentSession.data.exercises[ei].sets[si][field] = val; }
function updateNote(ei, val) { currentSession.data.exercises[ei].note = val; }
function toggleDeleteExo(ei) {
  const el = document.getElementById('del-confirm-' + ei);
  if (!el) return;
  el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
}
function deleteExo(ei) {
  currentSession.data.exercises.splice(ei, 1);
  renderSession();
}
function addSet(ei) {
  const sets = currentSession.data.exercises[ei].sets;
  const last = sets[sets.length - 1];
  sets.push({ reps: last ? last.reps : '10', weight: last ? last.weight : '', done: false });
  renderSets(ei);
}
function removeSet(ei, si) { currentSession.data.exercises[ei].sets.splice(si, 1); renderSets(ei); updateProgress(); }
function changeRest(ei, d) {
  const exo = currentSession.data.exercises[ei];
  exo.rest = Math.max(15, (exo.rest || 90) + d);
  document.getElementById('rest-' + ei).textContent = exo.rest + 's';
}
function toggleSet(ei, si) {
  const set = currentSession.data.exercises[ei].sets[si];
  set.done = !set.done;
  renderSets(ei);
  updateProgress();
  if (set.done) startTimer(currentSession.data.exercises[ei].rest);
}
function updateProgress() {
  const all = currentSession.data.exercises.flatMap(e => e.sets);
  const done = all.filter(s => s.done).length;
  document.getElementById('sess-progress').style.width = (all.length ? Math.round(done/all.length*100) : 0) + '%';
}

function finishSession() {
  const day = currentSession.data;
  const allSets = day.exercises.flatMap(e => e.sets);
  const doneSets = allSets.filter(s => s.done);
  const totalWeight = doneSets.reduce((acc, s) => acc + (parseFloat(s.weight)||0) * (parseInt(s.reps)||0), 0);
  const entry = {
    id: day.id,
    name: day.name,
    ts: Date.now(),
    duration: Math.max(1, Math.round((Date.now() - currentSession.startTime) / 60000)),
    setsCount: doneSets.length,
    setsTotal: allSets.length,
    totalWeight: Math.round(totalWeight),
    comment: '',
    exercises: day.exercises.map(e => ({
      name: e.name,
      sets: e.sets.map(s => ({ reps: s.reps, weight: s.weight, done: s.done }))
    }))
  };
  history.unshift(entry);
  program[currentSession.dayIdx] = JSON.parse(JSON.stringify(day));
  save();
  goHome();
}

// ─── TIMER ─────────────────────────────────────────────────────
function startTimer(sec) {
  clearInterval(timerInterval);
  timerSec = sec;
  document.getElementById('timer-num').textContent = timerSec;
  document.getElementById('timer-overlay').classList.add('active');
  timerInterval = setInterval(() => {
    timerSec--;
    document.getElementById('timer-num').textContent = timerSec;
    if (timerSec <= 0) { clearInterval(timerInterval); document.getElementById('timer-overlay').classList.remove('active'); }
  }, 1000);
}
function skipTimer() { clearInterval(timerInterval); document.getElementById('timer-overlay').classList.remove('active'); }

// ─── ADD EXERCISE MODAL ────────────────────────────────────────
function closeAddExo() { document.getElementById('modal-add-exo').classList.remove('active'); }
function confirmAddExo() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) return;
  const sets = parseInt(document.getElementById('new-sets').value) || 3;
  const reps = document.getElementById('new-reps').value || '12';
  const weight = document.getElementById('new-weight').value || '';
  const rest = parseInt(document.getElementById('new-rest').value) || 90;
  currentSession.data.exercises.push({ id:'custom_'+Date.now(), name, rest, note:'', sets: Array.from({length:sets}, () => ({reps, weight, done:false})) });
  closeAddExo();
  renderSession();
  setTimeout(() => { const b = document.getElementById('sess-body'); b.scrollTop = b.scrollHeight; }, 100);
}

// ─── HISTORY ───────────────────────────────────────────────────
function renderHistory() {
  const c = document.getElementById('hist-list');
  c.innerHTML = '';
  if (!history.length) {
    c.innerHTML = '<div class="empty-state"><div class="empty-big">0</div><p>Aucune séance terminée.<br>C\'est le moment de commencer !</p></div>';
    return;
  }
  history.forEach((h, idx) => {
    const d = new Date(h.ts);
    const el = document.createElement('div');
    el.className = 'hist-entry';
    el.innerHTML = `
      <div class="hist-date">${d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'})}</div>
      <div class="hist-name">${h.name}</div>
      <div class="hist-chips">
        <span class="hist-chip">⏱ ${h.duration} min</span>
        <span class="hist-chip">✓ ${h.setsCount}/${h.setsTotal} séries</span>
        ${h.totalWeight ? '<span class="hist-chip">🏋️ ' + h.totalWeight.toLocaleString('fr-FR') + ' lbs</span>' : ''}
        ${h.comment ? '<span class="hist-chip" style="color:var(--accent)">💬 note</span>' : ''}
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:8px">Appuyer pour le détail →</div>`;
    el.onclick = () => openHistDetail(idx);
    c.appendChild(el);
  });
}

function openHistDetail(idx) {
  currentHistIdx = idx;
  const h = history[idx];
  const d = new Date(h.ts);
  document.getElementById('hd-title').textContent = h.name;
  document.getElementById('hd-date').textContent = d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  document.getElementById('hd-stats').innerHTML = `
    <div class="stat-box"><div class="stat-val" style="font-size:22px">${h.duration}</div><div class="stat-label">Minutes</div></div>
    <div class="stat-box"><div class="stat-val" style="font-size:22px">${h.setsCount}/${h.setsTotal}</div><div class="stat-label">Séries</div></div>
    <div class="stat-box"><div class="stat-val" style="font-size:22px">${h.totalWeight ? h.totalWeight.toLocaleString('fr-FR') : '–'}</div><div class="stat-label">lbs total</div></div>`;
  const exoC = document.getElementById('hd-exos');
  exoC.innerHTML = '';
  (h.exercises || []).forEach(e => {
    const doneSets = e.sets.filter(s => s.done);
    const div = document.createElement('div');
    div.style.cssText = 'background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid var(--border)';
    div.innerHTML = `<div style="font-family:Barlow Condensed,sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;margin-bottom:8px">${e.name}</div>` +
      (doneSets.length
        ? doneSets.map((s,i) => `<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text-muted)">Série ${i+1}</span><span>${s.reps} reps × ${s.weight||'–'} lbs</span></div>`).join('')
        : '<div style="font-size:12px;color:var(--text-muted)">Aucune série cochée</div>');
    exoC.appendChild(div);
  });
  document.getElementById('hd-comment').value = h.comment || '';
  document.getElementById('modal-hist').classList.add('active');
}

function closeHistDetail() { document.getElementById('modal-hist').classList.remove('active'); hideDeleteConfirm(); }
function showDeleteConfirm() {
  document.getElementById('delete-confirm').style.display = 'block';
}
function hideDeleteConfirm() {
  document.getElementById('delete-confirm').style.display = 'none';
}
function deleteHistEntry() {
  history.splice(currentHistIdx, 1);
  save();
  closeHistDetail();
  renderHistory();
}
function saveComment() {
  if (currentHistIdx < 0) return;
  history[currentHistIdx].comment = document.getElementById('hd-comment').value;
  save();
  closeHistDetail();
  renderHistory();
}

renderHome();
</script>
